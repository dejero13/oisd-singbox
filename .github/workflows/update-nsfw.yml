name: Daily OISD NSFW → sing-box (.json + .srs)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
           python -m pip install --upgrade pip
           pip install requests
           pip install pyright
        
      - name: Check with Pyright
        run: python -m pyright update.py --warnings

      - name: Download latest sing-box
        run: |
          echo "🔍 Скачиваем последнюю версию sing-box..."
          
          # Более надёжный способ скачивания
          curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep "browser_download_url.*linux-amd64.tar.gz" \
            | cut -d : -f 2,3 \
            | tr -d \" \
            | wget -qi -
          
          tar -xzf sing-box-*-linux-amd64.tar.gz
          mv sing-box-*-linux-amd64/sing-box ./sing-box
          chmod +x ./sing-box
          ./sing-box version
          echo "✅ sing-box успешно установлен"

      - name: Run update script
        run: python update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add oisd-nsfw-small.json oisd-nsfw-small.srs oisd-nsfw-small.txt README.md
            git commit -m "🔄 Auto-update OISD NSFW Small ($(date -u +'%Y-%m-%d'))"
            git push
            echo "✅ Обновление выполнено и закоммичено"
          else
            echo "✅ Нет изменений"
          fi
