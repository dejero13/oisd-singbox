name: Daily OISD NSFW → sing-box (.json + .srs)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install requests
        
      - name: Check with Pyright
        run: python -m pyright update.py --warnings

      - name: Download latest sing-box
        run: |
          echo "🔍 Скачиваем последнюю версию sing-box..."
          
          # Более надёжный способ скачивания
          curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | grep "browser_download_url.*linux-amd64.tar.gz" \
            | cut -d : -f 2,3 \
            | tr -d \" \
            | wget -qi -
          
          tar -xzf sing-box-*-linux-amd64.tar.gz
          mv sing-box-*-linux-amd64/sing-box ./sing-box
          chmod +x ./sing-box
          ./sing-box version
          echo "✅ sing-box успешно установлен"

      - name: Run update script
        run: python update.py

      - name: Compile to .srs
        run: |
          echo "🔨 Компилируем oisd-nsfw-small.srs..."
          ./sing-box rule-set compile oisd-nsfw-small.json -o oisd-nsfw-small.srs
          ls -lh oisd-nsfw-small.srs

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if git diff --quiet; then
            echo "✅ Нет изменений"
          else
            git add oisd-nsfw-small.json oisd-nsfw-small.srs README.md
            git commit -m "Автообновление OISD NSFW Small $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "✅ Успешно обновлено и запушено"
          fi
