name: Daily OISD NSFW → sing-box (.json + .srs)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Install sing-box
        run: |
          # Получаем самую свежую стабильную версию
          SING_BOX_VERSION=$(curl -s https://api.github.com/repos/SagerNet/sing-box/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/' | sed 's/^v//')
          
          echo "Installing sing-box version: $SING_BOX_VERSION"
          
          # Скачиваем и распаковываем
          curl -L -o sing-box.tar.gz "https://github.com/SagerNet/sing-box/releases/download/v${SING_BOX_VERSION}/sing-box-${SING_BOX_VERSION}-linux-amd64.tar.gz"
          
          tar -xzf sing-box.tar.gz --strip-components=1
          
          # Устанавливаем в PATH
          sudo install -Dm755 sing-box /usr/local/bin/sing-box
          
          # Проверка
          sing-box version

      # Если action не понравится — закомментируй выше и раскомментируй ручной вариант ниже
      # - name: Download and install sing-box (manual)
      #   run: | 
      #     ... (код из предыдущего блока)

      - name: Check with Pyright (опционально)
        run: |
          pip install pyright
          python -m pyright update.py --warnings

      - name: Run update script
        run: python update.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         
          if [[ -n "$(git status --porcelain)" ]]; then
            git add oisd-nsfw-small.json oisd-nsfw-small.srs oisd-nsfw-small.txt README.md
            git commit -m "🔄 Auto-update OISD NSFW Small ($(date -u +'%Y-%m-%d'))"
            git push
            echo "✅ Обновление выполнено и закоммичено"
          else
            echo "✅ Нет изменений"
          fi

  release-latest:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete old 'latest' tag and release
        continue-on-error: true
        run: |
          git push origin :refs/tags/latest || true
          gh release delete latest --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create new 'latest' tag
        run: |
          git tag -f latest
          git push -f origin latest

      - name: Create/Update GitHub Release "latest"
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest OISD NSFW Small"
          body: |
            Автоматически обновлённые файлы OISD NSFW Small для sing-box.
            
            • oisd-nsfw-small.json
            • oisd-nsfw-small.srs
            • oisd-nsfw-small.txt
            
            Обновление от: ${{ github.event.schedule || 'ручного запуска' }} (UTC)
            Коммит: ${{ github.sha }}
          draft: false
          prerelease: false
          files: |
            oisd-nsfw-small.json
            oisd-nsfw-small.srs
            oisd-nsfw-small.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
